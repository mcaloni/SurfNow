spring:
  application:
    name: surf-now

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/surf_now}
    username: ${DATABASE_USER:wave}
    password: ${DATABASE_PASSWORD:wave123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

# AWS
aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${S3_BUCKET:surf-now-photos}
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:}

# APIs externas de surf
surf:
  stormglass:
    api-key: ${STORMGLASS_API_KEY:}
    base-url: https://api.stormglass.io/v2
  open-meteo:
    base-url: https://marine-api.open-meteo.com/v1/marine

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
