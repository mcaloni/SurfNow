services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: surf_now
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: wave123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wave -d surf_now"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/surf_now
      DATABASE_USER: wave
      DATABASE_PASSWORD: wave123
      STORMGLASS_API_KEY: ${STORMGLASS_API_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-surf-now-photos}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
